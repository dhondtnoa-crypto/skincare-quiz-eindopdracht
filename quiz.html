<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Playfair+Display:ital,wght@0,400..900;1,400..900&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="css/reset.css">
    <link rel="stylesheet" href="css/main.css">
    <link rel="icon" href="favicon/icons8-skincare-96.png" />
    <title>quiz</title>
</head>

<body>
    <main>
        <header>
            <nav class="navbar">
                <div class="header-bar">
                    <div class="logo">
                        <a href="index.html">LŪME</a>
                    </div>
                </div>
            </nav>
        </header>


        <section class="hero">
            <img src="images/elizabeth-lies-ZWPerNlqUu0-unsplash.jpg" alt="" class="hero-image">
            <!-- <img src="images/olivia-hutcherson-JJGdTfgPMJw-unsplash.jpg" alt="" class="hero-image"> -->
            <div class="hero-content">
                <h1 class="tagline">
                    Find Your Skin Type
                </h1>
                <p class="small-text">
                    <span>Answer a few questions</span>
                    <span>and get personalized skincare advice</span>
                </p>

                <article class="card">
                    <div class="loading-container">
                        <div class="loading-bar"></div>
                    </div>

                    <section class="questions">
                        <h3 class="question-text"></h3>
                    </section>

                    <div class="buttons">
                        <button id="button-1" class="button-quiz" data-state="off">button</button>
                        <button id="button-2" class="button-quiz" data-state="off">button</button>
                        <button id="button-3" class="button-quiz" data-state="off">button</button>
                    </div>

                    <div class="back-button-next">
                        <button id="back" class="button-quiz back">back</button>
                        <button id="next" class="button-quiz next">next</button>

                    </div>


                </article>
                <!-- <button class="start-button">start</button> -->
            </div>


        </section>
    </main>

    <footer class="site-footer">
        <div class="footer-inner">
            <p class="footer-logo">LŪME</p>

            <nav class="footer-nav">
                <a href="#">Contact</a>
            </nav>

            <p class="site-footer__copyright">© Noa D'hondt • Artevelde Hogeschool 2026</p>
        </div>
    </footer>


    <script src="js/main.js"></script>
</body>

</html>
